[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Netlify Forms
# Forms are automatically detected with data-netlify="true" attribute

# Redirect www to non-www
[[redirects]]
  from = "https://www.tbfreenamibia.com/*"
  to = "https://tbfreenamibia.com/:splat"
  status = 301
  force = true

# Custom 404
# [[redirects]]
#   from = "/*"
#   to = "/404"
#   status = 404
